  - id: A4-CASO15-q1
    tipo: directo
    area: A
    subarea: A4
    caso: "Google es reconocida por la calidad y flexibilidad para sus trabajadores: comida gratis, espacios para dormir, vacaciones, seguros y acceso a la última tecnología. Cada empleado organiza su tiempo, su horario de comida e incluso su siesta, basándose en la felicidad reportada por los trabajadores."
    enunciado: "De acuerdo con las características mencionadas, ¿a qué concepto hace referencia la descripción anterior?"
    opciones:
      - "Cultura organizacional"
      - "Valores de la empresa"
      - "Organización empresarial"
      - "Visión de la empresa"
    correcta: 0
    explicacion: "La cultura organizacional se caracteriza por las tradiciones, forma de organización, motivación y valores que destacan a una empresa frente a otras."

  - id: A4-CASO16-q1
    tipo: directo
    area: A
    subarea: A4
    caso: "Uno de los supermercados más grandes del mundo tiene problemas con sus trabajadores: son aislados, no hay buena comunicación y hay discusiones frecuentes. La empresa decide realizar actividades que favorezcan el compañerismo, mejoren la comunicación y promuevan el trabajo en equipo, los valores y las relaciones de confianza y respeto."
    enunciado: "¿A qué tipo de cultura organizacional corresponde lo que quiere imponer dicha empresa?"
    opciones:
      - "Competitiva"
      - "Burocrática"
      - "Humanista"
      - "Responsable"
    correcta: 2
    explicacion: "La cultura organizacional humanista se caracteriza por promover los valores, las relaciones afectivas y la comunicación."

  - id: A1-CASO16-q2
    tipo: directo
    area: A
    subarea: A1
    enunciado: "Es el organismo en México que se encarga del desarrollo responsable del medio ambiente, de la reforestación, la protección de la flora, la fauna y el control de gases de efecto invernadero."
    opciones:
      - "SEMARNAT"
      - "PFPAM"
      - "CONAGUA"
      - "CMF"
    correcta: 0
    explicacion: "La Secretaría de Medio Ambiente y Recursos Naturales (SEMARNAT) se encarga del desarrollo y de las acciones responsables de las empresas y de promover políticas de conservación."

  - id: A1-CASO17-q1
    tipo: directo
    area: A
    subarea: A1
    caso: "Una empresa de alimentos enlatados está en constante cambio por las políticas ambientales. Cumple con todos los requisitos que la ley ordena y desea transmitir un mensaje sobre las acciones responsables que tiene con la comunidad y el medio ambiente."
    enunciado: "¿A qué acción se hace referencia con lo que quiere lograr la empresa?"
    opciones:
      - "Acción empresarial ambiental"
      - "Desarrollo socialmente efectivo"
      - "Imagen socialmente responsable"
      - "Mensaje subliminal empresarial"
    correcta: 2
    explicacion: "Una imagen responsable es aquella que permite a la empresa mostrar su preocupación y acciones a favor del medio ambiente."

  - id: A2-CASO17-q2
    tipo: directo
    area: A
    subarea: A2
    enunciado: "Dentro del análisis FODA, son consideradas factores que desfavorecen a una empresa o proyecto, por ejemplo, salarios bajos, equipamiento viejo y falta de capacitación."
    opciones:
      - "Amenazas"
      - "Fortalezas"
      - "Debilidades"
      - "Oportunidades"
    correcta: 2
    explicacion: "Las debilidades son aquellos factores del análisis FODA que provocan o desfavorecen la situación interna de una empresa o proyecto."

  - id: A2-CASO18-q1
    tipo: directo
    area: A
    subarea: A2
    caso: "Una empresa de perfumes desea formular una estrategia que resuma y evalúe las fuerzas y debilidades de las áreas de la empresa, además de evaluar las relaciones entre estas áreas."
    enunciado: "¿Qué es lo que necesita la empresa para resolver su problemática?"
    opciones:
      - "Matriz de evaluación de factores internos"
      - "Matriz de evaluación de factores externos"
      - "Integración de valores de factores externos"
      - "Integración de valores de factores internos"
    correcta: 0
    explicacion: "La matriz de evaluación de factores internos (MEFI) toma en cuenta los elementos interiores que conforman la empresa para implementar estrategias que optimicen su administración."

  - id: A4-CASO19-q1
    tipo: directo
    area: A
    subarea: A4
    caso: "Una empresa de manufactura e impresión de CD, DVD y Blu-ray colocará nuevos responsables departamentales por la alta demanda en el área de impresión. Por ello habrá cambios en la organización y relación entre los empleados, para que cada uno cumpla sus respectivas funciones."
    enunciado: "¿A qué tipo de cambio organizacional se hace referencia?"
    opciones:
      - "Estructura"
      - "Tecnología"
      - "Personal"
      - "Proceso"
    correcta: 0
    explicacion: "El cambio de estructura se refiere a la organización de la empresa de acuerdo con las especificaciones de cada trabajo o área."

  - id: A3-CASO20-q1
    tipo: directo
    area: A
    subarea: A3
    caso: "Manuel, empresario exitoso, expandirá el área de negocios. Necesita a una persona que detecte buenas oportunidades en el mercado, sea directiva, tome riesgos calculados y elija buenas alternativas ante un problema."
    enunciado: "¿Cuál es la competencia que debe poseer la nueva persona encargada de dicha área?"
    opciones:
      - "Lenguaje y expresión"
      - "Toma de decisiones"
      - "Habilidades sociales"
      - "Habilidades personales"
    correcta: 1
    explicacion: "La capacidad de tomar decisiones se caracteriza por encontrar soluciones adecuadas y pertinentes ante un problema."

  - id: A3-CASO21-q1
    tipo: directo
    area: A
    subarea: A3
    caso: "Mauricio, empleado de gran desempeño, recibió un ascenso. En el nuevo puesto se encargará de implementar políticas y planes ejecutivos, supervisando y coordinando todas las acciones para cumplir los objetivos propuestos."
    enunciado: "¿A qué tipo de administrador pertenece Mauricio?"
    opciones:
      - "Gerencial"
      - "Alto"
      - "Medio"
      - "Bajo"
    correcta: 2
    explicacion: "El administrador de nivel medio implementa las políticas y planes ejecutivos, supervisando y coordinando las acciones para cumplir los objetivos."

  - id: A3-CASO22-q1
    tipo: directo
    area: A
    subarea: A3
    caso: "Lucía trabaja en el área de ventas. Es la encargada de interactuar con otras personas y organizaciones para establecer mejores relaciones y mejorar el apoyo de la empresa."
    enunciado: "¿Qué tipo de rol cumple Lucía en la empresa?"
    opciones:
      - "Representante"
      - "Relacional"
      - "Líder"
      - "Informativo"
    correcta: 1
    explicacion: "El rol relacional tiene la finalidad de comunicarse y relacionarse con personas y empresas para mejorar las redes de apoyo en la organización."

  - id: A2-CASO23-q1
    tipo: directo
    area: A
    subarea: A2
    caso: "Markets, empresa de ingeniería de autos, se organiza con tiempos de trabajo muy específicos y de manera jerárquica, donde las órdenes van del gerente al empleado. Con un nuevo gerente propone que todas las tareas se realicen para llegar a un solo objetivo y que la empresa funcione como una familia, donde todos aportan y aprenden unos de otros."
    enunciado: "De acuerdo con las características de la empresa antes del nuevo gerente, ¿a qué escuela del pensamiento pertenece?"
    opciones:
      - "Conductista"
      - "Clásica"
      - "Holística"
      - "Humanista"
    correcta: 1
    explicacion: "La escuela clásica se caracteriza por una organización y orden jerárquicos muy específicos con la finalidad de crecer y mejorar."

  - id: A2-CASO23-q2
    tipo: directo
    area: A
    subarea: A2
    caso: "Markets, empresa de ingeniería de autos, se organiza con tiempos de trabajo muy específicos y de manera jerárquica, donde las órdenes van del gerente al empleado. Con un nuevo gerente propone que todas las tareas se realicen para llegar a un solo objetivo y que la empresa funcione como una familia, donde todos aportan y aprenden unos de otros."
    enunciado: "¿A qué escuela del pensamiento pertenecen las características de cambio que quiere impartir el nuevo gerente?"
    opciones:
      - "Humanista"
      - "Holística"
      - "Conductista"
      - "De proceso"
    correcta: 1
    explicacion: "El pensamiento holístico tiene la finalidad de considerar a la empresa como un todo, donde todos los empleados contribuyen al bienestar de la misma."

  - id: A3-CASO23-q3
    tipo: directo
    area: A
    subarea: A3
    enunciado: "Relaciona las etapas del proceso administrativo con su definición. 1 Planificación: determinación de los objetivos y metas a alcanzar. 2 Organización: forma en que se distribuye el trabajo según las capacidades de cada empleado. 3 Dirección: realización de las indicaciones asignadas a cada área para que se cumplan en tiempo y forma. 4 Control: se observan los resultados, se rectifican y se vigilan los procesos."
    opciones:
      - "1b, 2c, 3a, 4d"
      - "a1, b3, c1, d4"
      - "a1, b2, c3, d4"
      - "1d, 2c, 3b, 4a"
    correcta: 0
    explicacion: "El proceso administrativo comienza con el planteamiento de los objetivos, sigue con la organización, la dirección (ejecución) y finaliza con el control y la supervisión: 1b, 2c, 3a, 4d (según la fuente, opción A)."

  - id: A3-CASO25-q1
    tipo: directo
    area: A
    subarea: A3
    caso: "Marco abrirá una empresa de galletas y harinas. Tiene los documentos y materiales en orden, pero le falta personal. Necesita diversos equipos para: ventas de galleta, distribución, elaboración de galletas, fabricación de empaque y manufactura."
    enunciado: "¿A qué etapa del proceso administrativo pertenece lo que está realizando Marco?"
    opciones:
      - "Planificar"
      - "Organizar"
      - "Dirigir"
      - "Controlar"
    correcta: 1
    explicacion: "La organización es el proceso mediante el cual se determinan las actividades y funciones de cada área o trabajador en la empresa."

  - id: A4-CASO26-q1
    tipo: directo
    area: A
    subarea: A4
    caso: "Una empresa que fabrica ropa pasa por una situación que afecta la productividad. Con la llegada del nuevo gerente, los empleados cambiaron: antes tenían buena comunicación, trabajaban con actitud, convivían los fines de semana y eran colaborativos."
    enunciado: "¿Qué es lo que cambió en dicha empresa con la llegada del gerente?"
    opciones:
      - "Comportamiento de los empleados"
      - "Clima organizacional"
      - "Las relaciones sociales"
      - "La comunicación entre empleados"
    correcta: 1
    explicacion: "El clima organizacional se refiere a la percepción de los trabajadores respecto a su trabajo, las actitudes, conductas y la forma en que conviven unos con otros."

  - id: A4-CASO27-q1
    tipo: directo
    area: A
    subarea: A4
    caso: "Una empresa de telefonía evalúa a sus trabajadores por las bajas ventas. Los resultados muestran que están molestos por la baja de sueldos, el aumento de horarios y un nuevo reglamento que les quita prestaciones y salario."
    enunciado: "De acuerdo con lo anterior, ¿a qué característica del entorno organizacional hace referencia?"
    opciones:
      - "Afectividad"
      - "Satisfacción"
      - "Motivación"
      - "Relación"
    correcta: 1
    explicacion: "La satisfacción se refiere a qué tan agradable es el trabajo para una persona; en este caso, los trabajadores están insatisfechos con las nuevas normas de la empresa."

  - id: A4-CASO28-q1
    tipo: directo
    area: A
    subarea: A4
    caso: "La empresa Alekane, de servicios hoteleros, observó una baja en las actividades de los empleados: no llegaban temprano, no alcanzaban metas y faltaban seguido. Cambiar de personal no funcionó. Recursos Humanos sugirió aumentar los salarios; semanas después los empleados cambiaron y aseguraban que les gustaba su trabajo y actuaban con responsabilidad."
    enunciado: "¿Qué concepto implementó el área de recursos humanos para que los trabajadores tuvieran dicho cambio?"
    opciones:
      - "Motivación"
      - "Afectividad"
      - "Satisfacción"
      - "Adaptación"
    correcta: 3
    explicacion: "La fuente marca como correcta la opción D (Adaptación). La motivación se refiere a la fuerza y empeño que una persona dedica a su trabajo; al recibir una recompensa económica, los empleados se motivaron a trabajar más esperando otra recompensa."

  # ==========================================================================
  # ÁREA 7 (PDF) — Derecho → F
  # ==========================================================================

  - id: F2-CASO1-q1
    tipo: directo
    area: F
    subarea: F2
    caso: "Un grupo de emprendedores planea conformar una empresa de importación y venta de productos de belleza por internet, sin necesidad de manejar stocks ni alquilar espacios físicos para sus tiendas."
    enunciado: "Este grupo de emprendedores se reputan comerciantes. ¿Cuál de los siguientes elementos NO corresponde a sus obligaciones?"
    opciones:
      - "Crear actos mercantiles como la adquisición de equipo de cómputo y servicios digitales."
      - "Conservación de su correspondencia, ya sea física o digital."
      - "Inscripción en el Registro Público de la Propiedad."
      - "Llevar la contabilidad de sus actividades comerciales por los medios que mejor le convengan."
    correcta: 0
    explicacion: "Las personas físicas o morales se reputan comerciantes al efectuar las actividades enumeradas en el Código de Comercio. Crear actos mercantiles no es una obligación del comerciante, sino una actividad que los define."

  - id: F2-CASO1-q2
    tipo: directo
    area: F
    subarea: F2
    caso: "Un grupo de emprendedores planea conformar una empresa de importación y venta de productos de belleza por internet, sin necesidad de manejar stocks ni alquilar espacios físicos para sus tiendas."
    enunciado: "Una empresa con actividad principal de manufactura de calzado da facilidades a sus obreros para adquirir sus productos, aunque la mayor parte de su producción se dirige al mercado exterior. ¿Cuál de las siguientes sociedades NO corresponde a esta empresa manufacturera?"
    opciones:
      - "Sociedad Anónima."
      - "Sociedad Cooperativa."
      - "Sociedad de Responsabilidad Limitada."
      - "Sociedad Civil."
    correcta: 3
    explicacion: "Las sociedades mercantiles están enumeradas en la legislación mercantil, pero la Sociedad Civil está prevista en los Códigos Civiles, por lo que su objetivo y formación no corresponden a una sociedad mercantil."

  - id: F2-CASO2-q1
    tipo: directo
    area: F
    subarea: F2
    caso: "Los socios y accionistas de la compañía La Perla de Campeche S. A. de C. V. decidieron poner fin a su empresa, debido principalmente a las bajas ventas de los últimos años."
    enunciado: "Para poner fin a su sociedad mercantil, debe disolverse y liquidarse la empresa. ¿Qué elemento NO es necesario para llegar a tal fin?"
    opciones:
      - "Que el administrador siga en funciones hasta el nombramiento de un liquidador."
      - "Los socios nombren un albacea para que administre los bienes a liquidarse."
      - "Hacer el pago a acreedores y deudas por pérdidas en ejercicios anteriores."
      - "Nombrar un liquidador para que se haga cargo de los bienes a liquidar."
    correcta: 1
    explicacion: "El nombramiento de un albacea no corresponde a la liquidación de una sociedad mercantil, ya que esa figura legal solo se utiliza en el derecho civil; lo correcto es el liquidador."

  - id: F2-CASO2-q2
    tipo: directo
    area: F
    subarea: F2
    caso: "Los socios y accionistas de la compañía La Perla de Campeche S. A. de C. V. decidieron poner fin a su empresa, debido principalmente a las bajas ventas de los últimos años."
    enunciado: "¿Qué efectos tiene la liquidación de la empresa?"
    opciones:
      - "Declararse en imposibilidad de pagos a sus acreedores."
      - "Cambiar su objeto para concluir sus operaciones pendientes."
      - "La empresa pierde su personalidad jurídica."
      - "Al disolverse la empresa se cancelan sus deudas."
    correcta: 1
    explicacion: "Al liquidarse una sociedad mercantil, esta no pierde su figura jurídica; la administración pasa a un liquidador y cambia su objeto para concluir sus operaciones pendientes y hacer frente a acreedores y obligaciones."

  - id: F2-CASO2-q3
    tipo: directo
    area: F
    subarea: F2
    caso: "Los socios y accionistas de la compañía La Perla de Campeche S. A. de C. V. decidieron poner fin a su empresa, debido principalmente a las bajas ventas de los últimos años."
    enunciado: "En la formación de una empresa de bienes agropecuarios se necesitan fuentes de financiamiento para comprar maquinaria y equipo, mediante contratos mercantiles. ¿Qué tipo de contratos deben suscribir para lograr su financiamiento?"
    opciones:
      - "Crédito"
      - "Garantía"
      - "Traslativo"
      - "Servicios"
    correcta: 0
    explicacion: "Los contratos de crédito incluyen los de habilitación o avío, refaccionario y agropecuario, por lo cual la nueva empresa requiere establecer un contrato de crédito."

  - id: F2-CASO3-q1
    tipo: directo
    area: F
    subarea: F2
    caso: "En la región de Soconusco, Chiapas, un grupo de emprendedores estableció una empresa de actividades artesanales que requiere de los artesanos locales. Por las características socioeconómicas, decidieron no elaborar contratos de trabajo, aunque sí existirá una relación laboral."
    enunciado: "¿Qué características debe tener esta relación laboral, aun en ausencia de un contrato de trabajo?"
    opciones:
      - "La prestación de un servicio personal con consentimiento de quien lo ofrecerá."
      - "La prestación de un servicio personal subordinado, continuo, formal y permanente."
      - "La prestación de un servicio personal subordinado con el pago correspondiente."
      - "La prestación del servicio personal dirigido por la empresa y por el pago."
    correcta: 2
    explicacion: "Para que exista una relación laboral, independientemente de la existencia de un contrato, deben coincidir tres elementos: un servicio personal, que sea subordinado y que se pague por ese servicio."

  - id: F2-CASO3-q2
    tipo: directo
    area: F
    subarea: F2
    caso: "En la región de Soconusco, Chiapas, un grupo de emprendedores estableció una empresa de actividades artesanales que requiere de los artesanos locales. Por las características socioeconómicas, decidieron no elaborar contratos de trabajo, aunque sí existirá una relación laboral."
    enunciado: "¿Qué sujetos son indispensables en una relación laboral para llevar a cabo el objetivo de la empresa artesanal?"
    opciones:
      - "Artesanos y autoridades"
      - "Emprendedores y población."
      - "Autoridades, emprendedores y artesanos."
      - "Emprendedores y artesanos"
    correcta: 3
    explicacion: "Los dos sujetos indispensables en una relación laboral son el patrón y el trabajador; en este caso, los emprendedores y los artesanos."

  - id: F2-CASO4-q1
    tipo: directo
    area: F
    subarea: F2
    caso: "Un sindicato de trabajadores de una empresa textil declaró la huelga porque la parte patronal no cumplió con cláusulas del contrato colectivo y se negó a negociar el incremento de salarios. Los trabajadores quieren evitar que la huelga sea declarada ilegal, por lo que cumplieron con los requisitos de la ley."
    enunciado: "¿Cuál de los siguientes requisitos NO corresponde a la petición de huelga?"
    opciones:
      - "Aviso al patrón y a la Junta de Conciliación y Arbitraje con al menos 6 días de anticipación a la fecha de inicio."
      - "Entregar al patrón el pliego de peticiones, anunciando el inicio de huelga si no se satisfacen."
      - "Que el sindicato sea apoyado por trabajadores de otras empresas del ramo, locales o nacionales."
      - "Que la huelga sea apoyada por la mayoría de los trabajadores de la empresa textil."
    correcta: 2
    explicacion: "No es un requisito de huelga que el sindicato sea apoyado por otras empresas del ramo; los demás elementos sí son requisitos indispensables para que la huelga no sea declarada ilegal."

  - id: F2-CASO4-q2
    tipo: directo
    area: F
    subarea: F2
    caso: "Un sindicato de trabajadores de una empresa textil declaró la huelga porque la parte patronal no cumplió con cláusulas del contrato colectivo y se negó a negociar el incremento de salarios. Los trabajadores quieren evitar que la huelga sea declarada ilegal, por lo que cumplieron con los requisitos de la ley."
    enunciado: "¿Cuál de los siguientes requisitos es necesario para que la huelga no sea declarada inexistente?"
    opciones:
      - "Que el contrato colectivo de trabajo sea registrado ante la autoridad laboral."
      - "Que la parte patronal se niegue a reconocer el contrato colectivo de trabajo."
      - "Que en la empresa solo exista una representación sindical."
      - "Que los trabajadores no suspendan labores, aunque se declare legal la huelga."
    correcta: 1
    explicacion: "Uno de los requisitos para que los trabajadores lleven a cabo su huelga es que el patrón se niegue a reconocer el contrato colectivo de trabajo, sea cual fuere la razón."

  - id: F2-CASO5-q1
    tipo: directo
    area: F
    subarea: F2
    caso: "En una empresa siderúrgica, un obrero al salir de su trabajo fue atropellado por un conductor que se dio a la fuga. Fue atendido en el IMSS, donde por la gravedad de la lesión tuvieron que amputarle una pierna."
    enunciado: "¿Qué derechos tiene el trabajador, si el accidente no ocurrió en las instalaciones de la empresa donde trabaja?"
    opciones:
      - "Ninguno, porque el accidente ocurrió afuera de su centro de trabajo."
      - "Indemnización por riesgo de trabajo."
      - "Incapacidad permanente total o parcial."
      - "Ser atendido indefinidamente por el IMSS."
    correcta: 1
    explicacion: "El riesgo de trabajo incluye los accidentes que ocurren no solo dentro del centro de trabajo, sino también en el trayecto de la casa del trabajador a su centro de trabajo y viceversa; por ello tiene derecho a indemnización por riesgo de trabajo."

