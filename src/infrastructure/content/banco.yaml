    area: E
    subarea: E3
    caso: "Una empresa abrirá sucursales en el Estado de México y Morelos y calcula el ingreso familiar. En el Estado de México obtuvo datos de 75 personas con media de $6,800 mensuales; en Morelos, de 80 personas con media de $4,450."
