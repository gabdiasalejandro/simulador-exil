# ============================================================================
# Banco de reactivos — Simulador EXIL-NEGOCIOS (CENEVAL)
# ============================================================================
#
# tipo: directo | completamiento | ordenamiento | relacion
#
# Áreas oficiales:
#   A — Administración
#   B — Contabilidad y finanzas
#   C — Economía
#   D — Mercadotecnia
#   E — Matemáticas y estadística
#   F — Derecho
#
# Formato de campo "caso": se repite en cada reactivo que forme parte
# de un multirreactivo (contexto compartido). No genera una sub-pregunta
# anidada; cada reactivo es independiente.
# ============================================================================

schemaVersion: 2

reactivos:

  # --------------------------------------------------------------------------
  # A. Administración
  # --------------------------------------------------------------------------

  - id: A3-001
    tipo: directo
    area: A             # Administración
    subarea: A3         # Proceso administrativo
    enunciado: "¿Cuál de los siguientes enunciados describe mejor la función de planeación dentro del proceso administrativo?"
    opciones:
      - "Determinar las tareas y la estructura necesaria para alcanzar los objetivos."
      - "Definir los objetivos y establecer los cursos de acción para alcanzarlos."
      - "Guiar y motivar al personal para que realice sus actividades."
      - "Medir el desempeño real y compararlo con los estándares establecidos."
    correcta: 1
    explicacion: "La planeación consiste en fijar objetivos y determinar los cursos de acción necesarios para lograrlos. La organización (opción A) define estructura; la dirección (opción C) motiva al personal; el control (opción D) mide el desempeño."

  - id: A2-001
    tipo: directo
    area: A             # Administración
    subarea: A2         # Pensamiento administrativo
    enunciado: "Según la teoría clásica de Fayol, ¿cuántos principios generales de la administración propuso?"
    opciones:
      - "7"
      - "10"
      - "14"
      - "20"
    correcta: 2
    explicacion: "Henri Fayol formuló 14 principios generales de la administración en su obra 'Administración industrial y general' (1916), entre ellos: división del trabajo, autoridad, disciplina, unidad de mando, etc."

  - id: A4-001
    tipo: ordenamiento
    area: A             # Administración
    subarea: A4         # Entorno organizacional
    enunciado: "Ordena las siguientes etapas del proceso de toma de decisiones gerenciales de acuerdo con la secuencia lógica correcta:"
    elementos:
      - "Identificar el problema u oportunidad"
      - "Definir los criterios de decisión"
      - "Generar alternativas de solución"
      - "Evaluar y seleccionar la mejor alternativa"
      - "Implementar la decisión y hacer seguimiento"
    ordenCorrecto: [0, 1, 2, 3, 4]
    explicacion: "El proceso racional de toma de decisiones sigue esta secuencia: primero se identifica el problema, luego se definen criterios, se generan alternativas, se evalúan y se elige la mejor, y finalmente se implementa con seguimiento."

  - id: A5-001
    tipo: directo
    area: A             # Administración
    subarea: A5         # Tecnologías y sistemas de información
    enunciado: "¿Cuál de las siguientes opciones describe mejor el concepto de ERP (Enterprise Resource Planning)?"
    opciones:
      - "Un software exclusivo de gestión de recursos humanos."
      - "Un sistema integrado que centraliza y automatiza los procesos de negocio de una organización."
      - "Una plataforma de comercio electrónico para ventas en línea."
      - "Un sistema de videoconferencia para trabajo remoto."
    correcta: 1
    explicacion: "Un ERP (Sistema de Planificación de Recursos Empresariales) es un software que integra y automatiza los procesos clave de la empresa —finanzas, logística, producción, RRHH— en una sola plataforma centralizada."

  # Reactivos de caso A1 — aplanados (multirreactivo sobre MBO)
  - id: A1-CASO1-q1
    tipo: directo
    area: A             # Administración
    subarea: A1         # Conceptos generales de administración
    caso: "Una empresa de manufactura implementó recientemente un programa de gestión por objetivos (MBO). La dirección estableció metas anuales en conjunto con los empleados y acordó revisiones trimestrales. Al final del año, se compararon los resultados obtenidos con los objetivos pactados."
    enunciado: "¿En qué etapa del proceso administrativo se ubica principalmente la gestión por objetivos (MBO)?"
    opciones:
      - "Organización"
      - "Dirección"
      - "Control"
      - "Planeación y control conjuntamente"
    correcta: 3
    explicacion: "La gestión por objetivos (MBO, Management by Objectives) abarca tanto la planeación (fijar objetivos al inicio) como el control (comparar resultados con metas al final del período), por lo que involucra ambas etapas."

  - id: A1-CASO1-q2
    tipo: completamiento
    area: A             # Administración
    subarea: A1         # Conceptos generales de administración
    caso: "Una empresa de manufactura implementó recientemente un programa de gestión por objetivos (MBO). La dirección estableció metas anuales en conjunto con los empleados y acordó revisiones trimestrales. Al final del año, se compararon los resultados obtenidos con los objetivos pactados."
    enunciado: "La revisión trimestral de resultados que describe el caso corresponde a la función administrativa de _______________."
    opciones:
      - "planeación estratégica"
      - "diseño organizacional"
      - "control"
      - "reclutamiento"
    correcta: 2
    explicacion: "El control consiste en medir el desempeño real, compararlo con estándares o metas establecidas, y aplicar medidas correctivas si es necesario. Las revisiones trimestrales son actividades de control."

  # --------------------------------------------------------------------------
  # B. Contabilidad y finanzas
  # --------------------------------------------------------------------------

  - id: B1-001
    tipo: directo
    area: B             # Contabilidad y finanzas
    subarea: B1         # Información financiera
    enunciado: "¿Cuál estado financiero muestra la situación patrimonial de una empresa en un momento determinado?"
    opciones:
      - "Estado de resultados"
      - "Estado de flujo de efectivo"
      - "Balance general (Estado de situación financiera)"
      - "Estado de cambios en el capital contable"
    correcta: 2
    explicacion: "El balance general o estado de situación financiera presenta en un punto en el tiempo los activos, pasivos y capital de la empresa."

  - id: B2-001
    tipo: directo
    area: B             # Contabilidad y finanzas
    subarea: B2         # Normatividad contable
    enunciado: "Las Normas de Información Financiera (NIF) en México son emitidas por:"
    opciones:
      - "La Secretaría de Hacienda y Crédito Público (SHCP)"
      - "El Instituto Mexicano de Contadores Públicos (IMCP)"
      - "El Consejo Mexicano de Normas de Información Financiera (CINIF)"
      - "La Comisión Nacional Bancaria y de Valores (CNBV)"
    correcta: 2
    explicacion: "El CINIF (Consejo Mexicano de Normas de Información Financiera) es el organismo privado encargado de emitir y actualizar las NIF en México."

  - id: B4-001
    tipo: completamiento
    area: B             # Contabilidad y finanzas
    subarea: B4         # Costos y presupuestos
    enunciado: "El costeo por absorción difiere del costeo variable principalmente en que el costeo por absorción incluye _______________ en el costo del producto."
    opciones:
      - "únicamente los costos variables de producción"
      - "los costos fijos de producción"
      - "los gastos de venta y administración"
      - "solo los costos directos de mano de obra"
    correcta: 1
    explicacion: "En el costeo por absorción, los costos fijos de manufactura se incluyen en el costo unitario del producto. El costeo variable solo incluye costos variables de producción."

  - id: B5-001
    tipo: completamiento
    area: B             # Contabilidad y finanzas
    subarea: B5         # Análisis de información financiera
    enunciado: "El análisis horizontal de estados financieros compara _______________ para identificar tendencias a lo largo del tiempo."
    opciones:
      - "el activo contra el pasivo en un mismo período"
      - "cifras de diferentes períodos de la misma empresa"
      - "el desempeño de la empresa contra el promedio de la industria"
      - "razones financieras contra índices macroeconómicos"
    correcta: 1
    explicacion: "El análisis horizontal (o de tendencias) compara las cifras financieras de la misma empresa en dos o más períodos consecutivos para identificar variaciones absolutas y porcentuales."

  # --------------------------------------------------------------------------
  # C. Economía
  # --------------------------------------------------------------------------

  - id: C1-001
    tipo: completamiento
    area: C             # Economía
    subarea: C1         # Fundamentos de economía
    enunciado: "En el modelo de oferta y demanda, cuando el precio de un bien baja, la cantidad demandada _____________, lo que refleja la ley de la demanda."
    opciones:
      - "disminuye"
      - "permanece constante"
      - "aumenta"
      - "se vuelve inelástica"
    correcta: 2
    explicacion: "La ley de la demanda establece que, ceteris paribus, existe una relación inversa entre el precio de un bien y la cantidad demandada: a menor precio, mayor cantidad demandada."

  - id: C2-001
    tipo: directo
    area: C             # Economía
    subarea: C2         # Economía de la empresa
    enunciado: "En el modelo microeconómico de equilibrio del mercado, el punto de equilibrio se alcanza cuando:"
    opciones:
      - "la cantidad ofrecida supera a la cantidad demandada."
      - "la cantidad demandada supera a la cantidad ofrecida."
      - "la cantidad ofrecida es igual a la cantidad demandada al precio de mercado."
      - "el gobierno fija un precio máximo igual al costo marginal."
    correcta: 2
    explicacion: "El equilibrio de mercado ocurre cuando, al precio vigente, la cantidad que los productores desean vender es exactamente igual a la que los consumidores desean comprar."

  # Reactivos de caso C3 — aplanados (multirreactivo sobre inflación)
  - id: C3-CASO1-q1
    tipo: directo
    area: C             # Economía
    subarea: C3         # Macroeconomía
    caso: "En el año anterior, el índice nacional de precios al consumidor (INPC) pasó de 110 a 121. Al mismo tiempo, el salario nominal promedio de los trabajadores aumentó de $12,000 a $13,200 mensuales."
    enunciado: "¿Cuál fue la tasa de inflación en ese período?"
    opciones:
      - "5%"
      - "8%"
      - "10%"
      - "12%"
    correcta: 2
    explicacion: "Inflación = ((121 - 110) / 110) × 100 = (11/110) × 100 = 10%."

  - id: C3-CASO1-q2
    tipo: directo
    area: C             # Economía
    subarea: C3         # Macroeconomía
    caso: "En el año anterior, el índice nacional de precios al consumidor (INPC) pasó de 110 a 121. Al mismo tiempo, el salario nominal promedio de los trabajadores aumentó de $12,000 a $13,200 mensuales."
    enunciado: "¿En cuánto aumentó el salario nominal en términos porcentuales?"
    opciones:
      - "8%"
      - "9%"
      - "10%"
      - "12%"
    correcta: 2
    explicacion: "Variación salarial = ((13,200 - 12,000) / 12,000) × 100 = (1,200/12,000) × 100 = 10%."

  - id: C3-CASO1-q3
    tipo: completamiento
    area: C             # Economía
    subarea: C3         # Macroeconomía
    caso: "En el año anterior, el índice nacional de precios al consumidor (INPC) pasó de 110 a 121. Al mismo tiempo, el salario nominal promedio de los trabajadores aumentó de $12,000 a $13,200 mensuales."
    enunciado: "Con base en los datos anteriores, el poder adquisitivo (salario real) de los trabajadores _______________ durante ese período."
    opciones:
      - "aumentó, porque el salario nominal subió más que la inflación"
      - "disminuyó, porque la inflación fue mayor al incremento salarial"
      - "se mantuvo constante, porque ambas tasas fueron iguales"
      - "aumentó, porque la inflación fue menor al 12%"
    correcta: 2
    explicacion: "Como la tasa de inflación (10%) fue igual al aumento del salario nominal (10%), el salario real permaneció constante: no hubo ganancia ni pérdida de poder adquisitivo."

  # --------------------------------------------------------------------------
  # D. Mercadotecnia
  # --------------------------------------------------------------------------

  - id: D1-001
    tipo: relacion
    area: D             # Mercadotecnia
    subarea: D1         # Mercado y empresa
    enunciado: "Relaciona cada concepto de mercadotecnia (columna izquierda) con su definición correcta (columna derecha):"
    columnaIzquierda:
      - "Segmentación de mercado"
      - "Posicionamiento"
      - "Mezcla de mercadotecnia (4P)"
      - "Ciclo de vida del producto"
    columnaDerecha:
      - "Conjunto de etapas: introducción, crecimiento, madurez y declive."
      - "División del mercado total en grupos homogéneos con necesidades similares."
      - "Lugar que ocupa una marca en la mente del consumidor respecto a la competencia."
      - "Combinación de producto, precio, plaza y promoción."
      - "Estrategia de distribución exclusiva en un solo canal."
    emparejamientos: [[0, 1], [1, 2], [2, 3], [3, 0]]
    explicacion: "Segmentación divide el mercado en grupos homogéneos; posicionamiento es la percepción del consumidor; la mezcla de mercadotecnia combina las 4P; el ciclo de vida recorre introducción, crecimiento, madurez y declive."

  - id: D2-001
    tipo: directo
    area: D             # Mercadotecnia
    subarea: D2         # Técnicas y herramientas de mercadotecnia
    enunciado: "¿Qué herramienta de mercadotecnia permite medir el nivel de satisfacción del cliente y su probabilidad de recomendar un producto o servicio?"
    opciones:
      - "Análisis FODA"
      - "Net Promoter Score (NPS)"
      - "Mapa de posicionamiento"
      - "Prueba A/B"
    correcta: 1
    explicacion: "El Net Promoter Score (NPS) es una métrica que pregunta a los clientes qué tan probable es que recomienden la marca a un conocido (escala 0-10), clasificándolos en promotores, pasivos y detractores."

  # --------------------------------------------------------------------------
  # E. Matemáticas y estadística
  # --------------------------------------------------------------------------

  # Reactivos de caso E1 — aplanados (multirreactivo sobre préstamo)
  - id: E1-CASO1-q1
    tipo: directo
    area: E             # Matemáticas y estadística
    subarea: E1         # Matemáticas financieras
    caso: "Una empresa solicita un préstamo de $100,000 pesos a una tasa de interés anual del 12%, capitalizable mensualmente, a un plazo de 2 años."
    enunciado: "¿Cuál es la tasa de interés mensual equivalente que se aplicará al préstamo?"
    opciones:
      - "1.00%"
      - "1.50%"
      - "6.00%"
      - "12.00%"
    correcta: 0
    explicacion: "Si la tasa anual es 12% capitalizable mensualmente, la tasa mensual es 12%/12 = 1% mensual."

  - id: E1-CASO1-q2
    tipo: directo
    area: E             # Matemáticas y estadística
    subarea: E1         # Matemáticas financieras
    caso: "Una empresa solicita un préstamo de $100,000 pesos a una tasa de interés anual del 12%, capitalizable mensualmente, a un plazo de 2 años."
    enunciado: "¿Cuántos períodos (meses) abarca el plazo total del préstamo?"
    opciones:
      - "12 meses"
      - "18 meses"
      - "24 meses"
      - "36 meses"
    correcta: 2
    explicacion: "2 años × 12 meses/año = 24 meses."

  - id: E1-001
    tipo: ordenamiento
    area: E             # Matemáticas y estadística
    subarea: E1         # Matemáticas financieras
    enunciado: "Para calcular el Valor Presente Neto (VPN) de un proyecto de inversión, ordena los pasos en la secuencia correcta:"
    elementos:
      - "Estimar los flujos de efectivo futuros del proyecto"
      - "Determinar la tasa de descuento (costo de capital)"
      - "Descontar cada flujo al período 0 usando la tasa elegida"
      - "Sumar todos los flujos descontados y restar la inversión inicial"
      - "Interpretar: VPN > 0 indica que el proyecto agrega valor"
    ordenCorrecto: [0, 1, 2, 3, 4]
    explicacion: "El VPN se calcula proyectando los flujos de caja, eligiendo una tasa de descuento que refleje el riesgo, trayendo cada flujo a valor presente, sumándolos y restando la inversión inicial."

  - id: E2-001
    tipo: ordenamiento
    area: E             # Matemáticas y estadística
    subarea: E2         # Fundamentos de cálculo
    enunciado: "Ordena los siguientes pasos para calcular la derivada de una función f(x) usando la definición límite (regla de la primera derivada):"
    elementos:
      - "Escribir la expresión f(x + h) sustituyendo (x + h) en la función"
      - "Calcular f(x + h) - f(x) y simplificar"
      - "Dividir el resultado entre h"
      - "Aplicar el límite cuando h tiende a cero"
      - "El resultado es f'(x)"
    ordenCorrecto: [0, 1, 2, 3, 4]
    explicacion: "La definición formal de derivada sigue este proceso: f'(x) = lim_{h→0} [f(x+h) - f(x)] / h. Se evalúa f(x+h), se resta f(x), se divide entre h, se simplifica y se toma el límite."

  - id: E3-001
    tipo: relacion
    area: E             # Matemáticas y estadística
    subarea: E3         # Estadística descriptiva
    enunciado: "Relaciona cada medida de tendencia central o dispersión (columna izquierda) con su descripción (columna derecha):"
    columnaIzquierda:
      - "Media aritmética"
      - "Mediana"
      - "Desviación estándar"
      - "Rango"
    columnaDerecha:
      - "Diferencia entre el valor máximo y mínimo del conjunto de datos."
      - "Valor central que divide la distribución en dos mitades iguales."
      - "Promedio de todos los valores del conjunto de datos."
      - "Medida de dispersión que expresa cuánto se alejan los datos de la media."
    emparejamientos: [[0, 2], [1, 1], [2, 3], [3, 0]]
    explicacion: "La media es el promedio aritmético; la mediana es el valor central; la desviación estándar mide dispersión respecto a la media; el rango es la diferencia entre máximo y mínimo."

  # --------------------------------------------------------------------------
  # F. Derecho
  # --------------------------------------------------------------------------

  - id: F1-001
    tipo: directo
    area: F             # Derecho
    subarea: F1         # Derecho público
    enunciado: "¿Cuál de los siguientes instrumentos jurídicos constituye la norma suprema del ordenamiento jurídico mexicano?"
    opciones:
      - "El Código Civil Federal"
      - "La Ley Federal del Trabajo"
      - "La Constitución Política de los Estados Unidos Mexicanos"
      - "El Código de Comercio"
    correcta: 2
    explicacion: "El artículo 133 de la Constitución establece el principio de supremacía constitucional: la Constitución Política de los Estados Unidos Mexicanos es la Ley Suprema de toda la Unión."

  - id: F2-001
    tipo: relacion
    area: F             # Derecho
    subarea: F2         # Derecho privado
    enunciado: "Relaciona cada figura jurídica del derecho mercantil (columna izquierda) con su característica principal (columna derecha):"
    columnaIzquierda:
      - "Sociedad Anónima (S.A.)"
      - "Sociedad de Responsabilidad Limitada (S. de R.L.)"
      - "Contrato de mutuo mercantil"
      - "Letra de cambio"
    columnaDerecha:
      - "Título de crédito que incorpora una orden incondicional de pago."
      - "Socios responden solo hasta el monto de sus aportaciones; máximo 50 socios."
      - "Capital dividido en acciones; responsabilidad limitada al capital aportado."
      - "Acuerdo por el cual una parte entrega dinero a otra con obligación de devolverlo."
      - "Contrato por el cual se ceden derechos reales sobre bienes inmuebles."
    emparejamientos: [[0, 2], [1, 1], [2, 3], [3, 0]]
    explicacion: "La S.A. divide su capital en acciones con responsabilidad limitada; la S. de R.L. limita la responsabilidad y el número de socios; el mutuo mercantil implica préstamo con obligación de devolución; la letra de cambio es un título de crédito con orden de pago."
