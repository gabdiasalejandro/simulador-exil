  - id: E3-CASO3-q1
    tipo: directo
    area: E
    subarea: E3
    caso: "Una empresa de evaluación de atención al cliente trabaja con una distribuidora de helados que ha recibido quejas. Las quejas se presentan en tres estados: Estado de México (15), Ciudad de México (80) y Jalisco (30). Se quiere seleccionar una muestra de 50 quejas, proporcional y simple, de los tres estados."
    enunciado: "¿Qué tipo de muestreo es el más adecuado para evaluar el número de quejas que presentó la distribuidora?"
    opciones:
      - "Aleatorio simple"
      - "Estratificado"
      - "Conglomerado"
      - "Azar"
    correcta: 1
    explicacion: "El muestreo estratificado elige proporcionalmente una muestra de acuerdo con el número de personas y las necesidades del investigador."

  - id: E3-CASO4-q1
    tipo: directo
    area: E
    subarea: E3
    caso: "Una empresa que evalúa la satisfacción de la gente analizará el voto de la población en las próximas elecciones del Estado de Puebla. Por una crisis económica, decide reducir costos seleccionando pequeños grupos en los diferentes municipios del estado."
    enunciado: "¿Qué tipo de muestreo está utilizando la empresa?"
    opciones:
      - "Conglomerados"
      - "Estratificado"
      - "Aleatorio simple"
      - "Por conveniencia"
    correcta: 0
    explicacion: "El muestreo por conglomerados divide la población en pequeños grupos para reducir costos, de acuerdo con los intereses que se persiguen."

  - id: E3-CASO5-q1
    tipo: directo
    area: E
    subarea: E3
    caso: "DHL investigó el envío de 220 paquetes para determinar las tardanzas. Resultados: 2 días de adelanto: 65; 1 día de adelanto: 96; a tiempo: 19; 1 día de retardo: 21; 2 días de retardo: 19."
    enunciado: "Con estos datos, determina el porcentaje de envíos que llegan retrasados."
    opciones:
      - "19%"
      - "38%"
      - "84%"
      - "18%"
    correcta: 3
    explicacion: "Los envíos retrasados son 21 + 19 = 40 de 220, lo que equivale aproximadamente al 18%. La mayoría llega a tiempo o adelantada."

  - id: E3-CASO6-q1
    tipo: directo
    area: E
    subarea: E3
    caso: "Una empresa que fabrica piezas para autos tiene 40 hijos entre todos sus trabajadores y hará un convivio por el Día del Padre. Las edades de los hijos son: 3, 15, 24, 28, 33, 35, 38, 42, 43, 38, 36, 34, 29, 25, 17, 7, 34, 36, 39, 44, 31, 26, 20, 11, 13, 22, 27, 47, 39, 37, 34, 32, 35, 28, 38, 41, 48, 15, 32, 13."
