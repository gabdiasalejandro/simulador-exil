    tipo: directo
    area: E
    subarea: E3
    caso: "Una empresa refresquera ha disminuido sus ventas por escándalos de contaminación de su producto. Se cuenta con una tabla de ventas de refrescos por sabor (limón, naranja, piña, uva) y por mes (enero a abril), con totales mensuales de 2,250,000; 1,737,000; 1,041,000 y 857,000."
