      - "1a, 2b, 3d, 4c"
      - "1b, 2a, 3d, 4c"
      - "1d, 2b, 3c, 4a"
    correcta: 0
    explicacion: "Las variables nominales y ordinales son cualitativas, y las de intervalo y razón son cuantitativas. La relación correcta es 1c, 2d, 3b, 4a."

  - id: E3-CASO1-q1
    tipo: directo
    area: E
