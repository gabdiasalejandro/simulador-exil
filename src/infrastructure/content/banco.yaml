  - id: E3-CASO12-q1
    tipo: directo
    area: E
    subarea: E3
    caso: "En un estudio sobre preferencia de pasta dental, el 60% de las personas prefiere Dentitos y el restante prefiere Limpimax. Se extrae una muestra de 10 personas al azar."
    enunciado: "¿Cuál es la probabilidad de que 7 de estas personas prefieran Limpimax?"
    opciones:
      - ".47"
      - ".40"
      - ".38"
      - ".36"
    correcta: 2
