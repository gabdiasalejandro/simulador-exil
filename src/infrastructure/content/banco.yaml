  - id: E3-CASO2-q1
    tipo: directo
    area: E
    subarea: E3
    caso: "La fábrica Colorina quiere determinar las preferencias de los consumidores por su producto saca-goma. Las ventas en las últimas semanas fueron: semana 1: 13,697; semana 2: 45,930; semana 3: 72,940; semana 4: 89,011; semana 5: 89,820."
    enunciado: "El encargado quiere saber la media de ventas para estimar las de la siguiente semana. ¿Cuál es la media de los datos presentados?"
    opciones:
      - "51,899"
      - "52,987"
      - "23,458"
      - "24,589"
    correcta: 0
    explicacion: "La media se obtiene sumando las ventas y dividiendo entre el número de semanas: (13,697 + 45,930 + 72,940 + 89,011 + 89,820) / 5 = 51,899."

  - id: E3-CASO2-q2
    tipo: directo
    area: E
    subarea: E3
    caso: "La fábrica Colorina quiere determinar las preferencias de los consumidores por su producto saca-goma. Las ventas en las últimas semanas fueron: semana 1: 13,697; semana 2: 45,930; semana 3: 72,940; semana 4: 89,011; semana 5: 89,820."
    enunciado: "El encargado quiere determinar el rango de las ventas de estos meses. Calcula dicho rango."
