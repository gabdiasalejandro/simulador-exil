  - id: E3-CASO7-q1
    tipo: directo
    area: E
    subarea: E3
    caso: "Un empresario desea estimar, con 99% de confianza, la media del peso de cierto grupo de personas con obesidad. Los valores presentan distribución normal con varianza de 144. Se tomó una muestra de 15 personas con media de 84.3 kg. El valor de z para 0.99 es 2.58 y el error estándar es 3.10."
    enunciado: "Determina el intervalo de confianza."
    opciones:
      - "76.3 y 92.3"
      - "84.3 y 94.3"
      - "76.3 y 86.3"
      - "84.3 y 74.3"
    correcta: 0
    explicacion: "El intervalo se obtiene mediante (estimador) ± (coeficiente de confiabilidad × error estándar) = 84.3 ± (2.58 × 3.10), resultando en 76.3 y 92.3."

  - id: E3-CASO8-q1
