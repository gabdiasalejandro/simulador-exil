      - "12%"
      - "10%"
      - "15%"
      - "20%"
    correcta: 0
    explicacion: "El número de hijos menores de 15 años es cinco, lo que corresponde a un porcentaje del 12%, indicando que la mayoría de los hijos son mayores."

