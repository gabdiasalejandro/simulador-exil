  - id: D1-CASO1-q1
    tipo: directo
    area: D
    subarea: D1
    caso: "Se creó el Hotel Pet Care, un hotel para mascotas que ofrece baños, cepillado de dientes, área de juegos con alberca, comida, masajes y cuidados exclusivos. La campaña en redes sociales se dirigió a personas entre 25 y 35 años que se definan como 'Pet lovers', además de un flyer en una gaceta quincenal distribuida en Interlomas, Ciudad de México."
    enunciado: "¿Qué tipos de mercado se ejemplifican en el párrafo anterior?"
    opciones:
      - "Mercado competitivo, mercado de industria, mercado de empresa."
      - "Mercado de nichos, mercado actual, mercado de producto."
      - "Mercado de servicios, mercado de nicho, mercado particular."
      - "Mercado gubernamental, mercado real, mercado total."
    correcta: 2
    explicacion: "El mercado de servicios aplica esfuerzos humanos o mecánicos a personas, animales u objetos; el mercado de nicho es un grupo específico de compradores con necesidades particulares; y el mercado particular es un grupo con necesidades y comportamientos parecidos en un proceso de intercambio."

  - id: D1-CASO1-q2
    tipo: directo
    area: D
    subarea: D1
    caso: "Se creó el Hotel Pet Care, un hotel para mascotas que ofrece baños, cepillado de dientes, área de juegos con alberca, comida, masajes y cuidados exclusivos. La campaña en redes sociales se dirigió a personas entre 25 y 35 años que se definan como 'Pet lovers', además de un flyer en una gaceta quincenal distribuida en Interlomas, Ciudad de México."
    enunciado: "¿Cuál es el texto que más encaja para la descripción de un buyer persona del caso?"
    opciones:
      - "José, 32 años, vive cerca de Interlomas, pasea perros y cobra $50 por tarde; ingresos de unos $20,000 mensuales."
      - "Minerva, 27 años, estudiante de maestría que vive en Interlomas, trabaja en publicidad, gana unos $30,000, viaja al menos 5 veces al mes y no sabe con quién dejar a sus dos husky siberiano."
      - "Ana, 29 años, casada con dos hijos, tiene una perrita de raza pequeña que cuidan como una hija más; ingresos del hogar de unos $40,000."
      - "Alma, 65 años, recién jubilada con $30,000 mensuales, tiene dos chihuahuas con problemas en los huesos que lleva a terapia."
    correcta: 1
    explicacion: "El texto de Minerva ejemplifica a un posible consumidor (buyer persona) del servicio, mencionando su comportamiento, necesidades, información demográfica y motivaciones."

  - id: D1-CASO2-q1
    tipo: directo
    area: D
    subarea: D1
    caso: "Una reconocida empresa de comida rápida realizó un análisis de mercado en diferentes ciudades, lo que le permitió reconocer qué platillos son preferidos en distintos países. Esa estrategia fue la clave de su éxito y su expansión empresarial, llevando el mismo bien o servicio a mercados más amplios."
    enunciado: "¿Qué tipo de marketing llevó a cabo la reconocida empresa?"
    opciones:
      - "Marketing internacional"
      - "Marketing multinacional"
      - "Marketing global"
      - "Marketing regional"
    correcta: 1
    explicacion: "El marketing multinacional se desprende del internacional, pero se especializa en el desarrollo de estrategias específicas y especializadas para cada país."

  - id: D1-CASO2-q2
    tipo: directo
    area: D
    subarea: D1
    caso: "Una reconocida empresa de comida rápida realizó un análisis de mercado en diferentes ciudades, lo que le permitió reconocer qué platillos son preferidos en distintos países. Esa estrategia fue la clave de su éxito y su expansión empresarial, llevando el mismo bien o servicio a mercados más amplios."
    enunciado: "¿Qué objetivos se formulan para un buen nivel de desempeño en un mercado internacional?"
    opciones:
      - "Ventas, rentabilidad y posicionamiento."
      - "Lealtad de clientes, generación de leads y credibilidad."
      - "Innovación, presencia online y cuota de mercado."
      - "Inversión, ventas y generación de leads."
    correcta: 0
    explicacion: "El objetivo principal se traduce en ventas (participación del mercado), que generan rentabilidad económica y, casi en automático, un posicionamiento; con ello crece la imagen de marca en cada país."

  - id: D2-CASO3-q1
    tipo: directo
    area: D
    subarea: D2
    caso: "Una empresa nacional de ropa de dama y caballero, con 35 tiendas en México, inició hace cinco años la venta en línea. Para idealizar nuevas estrategias requiere mucha información de sus clientes (saber qué artículo es el más solicitado). Lo que quiere conseguir, además de un mayor nivel de ventas, es fidelización y satisfacción del cliente."
    enunciado: "¿Qué técnica o herramienta de mercadotecnia es conveniente que implemente dicha empresa?"
    opciones:
      - "Investigación de mercados"
      - "Métodos cualitativos"
      - "CRM"
      - "Métodos cuantitativos"
    correcta: 2
    explicacion: "El CRM construye relaciones duraderas comprendiendo las necesidades y preferencias de cada cliente de forma individual, para ofrecer el producto que quieran, cuando lo quieran y como lo requieran."

  - id: D2-CASO3-q2
    tipo: directo
    area: D
    subarea: D2
    caso: "Una empresa nacional de ropa de dama y caballero, con 35 tiendas en México, inició hace cinco años la venta en línea. Para idealizar nuevas estrategias requiere mucha información de sus clientes (saber qué artículo es el más solicitado). Lo que quiere conseguir, además de un mayor nivel de ventas, es fidelización y satisfacción del cliente."
    enunciado: "¿Qué concepto se refiere a la transformación de datos útiles para la empresa?"
    opciones:
      - "Data mining (minería de datos)"
      - "Gestión de bases de datos"
      - "Data warehouse (depósito de datos)"
      - "Recolección de beneficios estratégicos"
    correcta: 0
    explicacion: "El data mining se refiere a la búsqueda de los datos, rescatando aquellos que aportan información útil, relevante y no evidente."

  - id: D2-CASO4-q1
    tipo: directo
    area: D
    subarea: D2
    caso: "Jeriko, marca de alimentos lácteos nueva en el mercado, tiene como público objetivo a menores de entre 5 y 12 años. El director creativo realizará una campaña de neuromarketing, una prueba sensorial, midiendo las reacciones mediante una técnica de resonancia que explora el cerebro e identifica qué zona se activa ante cada estímulo."
    enunciado: "¿Qué procedimiento específico se aplicará a los sujetos para medir con el resonador?"
    opciones:
      - "NeuroScent"
      - "Neurolinguistics"
      - "Sensometrics"
      - "Respuestas faciales"
    correcta: 2
    explicacion: "Al ser una prueba sensorial, la sensometría (Sensometrics) permite medir los efectos que causan los sabores, olores e imágenes de un producto; es usada cuando los sujetos son difíciles de entrevistar (niños)."

  - id: D2-CASO5-q1
    tipo: directo
    area: D
    subarea: D2
    caso: "Saphiro Mish, marca de maquillaje profesional, para lanzar un nuevo producto reunió a 8 maquillistas profesionales de entre 25 y 35 años. Les entregó un cuaderno de anotaciones, tres prototipos y un set de brochas, y por un mes debían documentar a detalle sus experiencias usándolos con sus clientes. Después se reunieron a compartir sus vivencias y eligieron el prototipo 2."
    enunciado: "¿A qué tipo de método hace referencia el caso expuesto?"
    opciones:
      - "Método analítico"
      - "Método cualitativo"
      - "Método experimental"
      - "Método cuantitativo"
    correcta: 1
    explicacion: "El método cualitativo permite un acercamiento a las acciones reales y muestra el comportamiento cotidiano de cierto número de individuos."

  - id: D2-CASO5-q2
    tipo: directo
    area: D
