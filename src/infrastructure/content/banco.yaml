    subarea: E3
    enunciado: "Relaciona los tipos de variables con su definición. 1 Nominal: variable cualitativa que categoriza según características (sexo, religión). 2 Ordinal: cualitativa que ordena los datos por jerarquía (1.º, 2.º, 3.º lugar). 3 Intervalo: cuantitativa con orden entre la distancia de cantidades (temperatura, distancia). 4 Razón: cuantitativa con ausencia total (0) en su medida (edad, peso, dinero). ¿Cuál es la relación correcta?"
    opciones:
