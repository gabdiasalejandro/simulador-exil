  - id: E3-CASO9-q1
    tipo: directo
    area: E
    subarea: E3
    caso: "Una organización abrirá una cadena de comida rápida. Obtuvo datos de 150 personas sobre cuántas veces comieron fuera de casa el último mes: promedio 5.8 con desviación estándar 3.1. Desea saber si la media poblacional es mayor que 5 (hipótesis nula: media menor o igual a 5)."
    enunciado: "Determina el valor de z."
    opciones:
      - "2.1"
      - "3.2"
      - "2.3"
      - "3.4"
    correcta: 1
    explicacion: "El valor z se obtiene mediante (media − valor de referencia) / (desviación estándar / √n) = (5.8 − 5) / (3.1 / √150) ≈ 3.2."

