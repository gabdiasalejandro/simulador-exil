    elementos:
      - "Identificar el problema u oportunidad"
      - "Definir los criterios de decisión"
      - "Generar alternativas de solución"
      - "Evaluar y seleccionar la mejor alternativa"
      - "Implementar la decisión y hacer seguimiento"
    ordenCorrecto: [0, 1, 2, 3, 4]
