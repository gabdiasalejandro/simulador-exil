      - "Gráfica c) (ventas por mes, incompleta)"
      - "Gráfica d) (con nombre, indicadores horizontales y verticales y datos correctos)"
    correcta: 3
    explicacion: "Es la única gráfica que posee todos los datos completos: nombre, indicadores horizontales y verticales, y presenta los datos correctamente."

