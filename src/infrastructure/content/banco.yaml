      - "76,123"
      - "26,145"
      - "96,154"
    correcta: 1
    explicacion: "El rango es la diferencia entre el dato más alto y el más bajo: 89,820 − 13,697 = 76,123."

  - id: E3-CASO2-q3
    tipo: directo
    area: E
    subarea: E3
    caso: "La fábrica Colorina quiere determinar las preferencias de los consumidores por su producto saca-goma. Las ventas en las últimas semanas fueron: semana 1: 13,697; semana 2: 45,930; semana 3: 72,940; semana 4: 89,011; semana 5: 89,820."
    enunciado: "El encargado quiere determinar cuánto se alejan las ventas por día respecto a su media. ¿Qué tipo de análisis estadístico necesita?"
    opciones:
      - "Mediana"
