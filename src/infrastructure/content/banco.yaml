# ============================================================================
# Banco de reactivos — Simulador EXIL-NEGOCIOS (CENEVAL)
# ============================================================================
#
# Reactivos transcritos fielmente del PDF de ejercicios de preparación.
# Principio rector: TRANSCRIBIR, NO INVENTAR. Enunciados, opciones, respuesta
# correcta y explicación se copian tal como aparecen en la fuente.
#
# tipo: directo | completamiento | ordenamiento | relacion
#
# Áreas oficiales:
#   A — Administración
#   B — Contabilidad y finanzas
#   C — Economía
#   D — Mercadotecnia
#   E — Matemáticas y estadística
#   F — Derecho
#
# Mapeo de las 8 áreas del PDF (preparación) a las 6 áreas oficiales:
#   Área 1 Matemáticas y cálculo empresarial → E (E1 financieras / E2 cálculo)
#   Área 2 Economía y contabilidad empresarial → C (economía) o B (contabilidad)
#   Área 3 Estadística descriptiva → E3
#   Área 4 Estadística inferencial → E3 (la oficial no distingue inferencial)
#   Área 5 Habilidades profesionales básicas → A
#   Área 6 Competencias profesionales empresariales → A
#   Área 7 Derecho → F (público/fiscal→F1; mercantil/laboral/privado→F2)
#   Área 8 Mercadotecnia → D (mercado→D1; técnicas/herramientas→D2)
#
# "Respuesta correcta A/B/C/D" del PDF → correcta 0/1/2/3.
#
# Campo "caso": contexto compartido de un multirreactivo. Se repite en cada
# reactivo del caso; cada reactivo es independiente (casos aplanados).
#
# Nota: los reactivos de tipo "ordenamiento" y "relacion" (4 pares) se
# conservan del banco semilla anterior porque el PDF no contiene reactivos
# nativos de esos tipos (sus "relaciona columnas" vienen como opción múltiple
# de combinaciones de letras, por lo que se transcriben como "directo").
# ============================================================================

schemaVersion: 2

reactivos:

  # ==========================================================================
  # ÁREA 1 (PDF) — Matemáticas y cálculo empresarial → E
  # ==========================================================================

  - id: E1-001
    tipo: directo
    area: E
    subarea: E1
    enunciado: "Tomando como referencia un ejercicio de 2015 en donde se obtuvo una ganancia de $4,800,000 y en 2016 de $5,950,000, determina la variación monetaria y la variación porcentual."
    opciones:
      - "$1,150,000 y 23.96%"
      - "$1,100,000 y 23.96%"
      - "$1,150,000 y 29.36%"
      - "$1,100,000 y 29.36%"
    correcta: 0
    explicacion: "La variación monetaria se obtiene restando el año base: $5,950,000 - $4,800,000 = $1,150,000. Tomando como base 2015 ($4,800,000), $1,150,000 equivale al 23.96% de variación porcentual."

  - id: E1-002
    tipo: directo
    area: E
    subarea: E1
    enunciado: "Una persona cuenta con un capital de $2,500,000 y desea saber cuánto tendrá en 12 meses, la tasa de interés aplicable es del 3.5% mensual."
    opciones:
      - "$3,555,000"
      - "$3,050,000"
      - "$3,550,000"
      - "$3,500,000"
    correcta: 2
    explicacion: "Con la fórmula de capitalización simple M = C + (C × (n × i)), sustituyendo: M = $2,500,000 + (2,500,000 × (12 × 0.035)) = $3,550,000."

  - id: E2-001
    tipo: directo
    area: E
    subarea: E2
    enunciado: "El ingreso total de una escuela por x alumnos se establece por a = 1500x, los gastos mensuales totales son b = 890x + 2350. ¿Cuántos alumnos se deben tener mensualmente para mantener el punto de equilibrio?"
    opciones:
      - "3"
      - "4"
      - "5"
      - "6"
    correcta: 1
    explicacion: "En equilibrio a = b: 1500x = 890x + 2350; 610x = 2350; x = 3.85. Se requieren aproximadamente 4 alumnos inscritos mensuales para mantener el punto de equilibrio."

  - id: E1-003
    tipo: directo
    area: E
    subarea: E1
    enunciado: "Se necesita calcular el monto al cual equivalen 8 pagos anticipados de $23,500 si el interés es del 25% anual."
    opciones:
      - "466,283.66"
      - "476,283.66"
      - "486,283.66"
      - "496,283.66"
    correcta: 0
    explicacion: "Con la fórmula de monto de una anualidad M = R[((1 + i)^n − 1) / i] y los datos n = 8, R = $23,500, i = 25%, se obtiene M = 466,283.66."

  - id: E2-CASO1-q1
    tipo: directo
    area: E
    subarea: E2
    caso: "Una empresa de alimentos produce dos tipos de mezclas para sus panes, ambos a base de harina y salvado. La mezcla clásica lleva 8 kg de harina por cada 42 kg de salvado. La mezcla light lleva 4 kg de harina por cada 7 kg de salvado. La fábrica dispone en este momento de 38 kg de harina y 73 kg de salvado."
    enunciado: "¿Cuántos kg de mezcla light puede fabricar hasta agotar el stock?"
    opciones:
      - "115.58 kg mezcla y 11.6 kg sobrante"
      - "114.58 kg mezcla y 11.6 kg sobrante"
      - "114.58 kg mezcla y 16.6 kg sobrante"
      - "115.58 kg mezcla y 16.6 kg sobrante"
    correcta: 1
    explicacion: "Planteando el sistema 8/50·x + 4/11·y = 38 y 42/50·x + 7/11·y = 73, y resolviendo por sustitución, se obtiene x = 11.6 kg y y = 114.58 kg de mezcla light."

  - id: E2-CASO2-q1
    tipo: directo
    area: E
    subarea: E2
    caso: "La empresa Telcel ofrece a sus clientes un plan que incluye celular nuevo en $800 y la tarifa fija mensual de $200, plan todo incluido."
    enunciado: "¿Cuánto se habrá pagado en el transcurso de 11 meses? (Identifícalo mediante la gráfica)."
    opciones:
      - "3600"
      - "3400"
      - "3200"
      - "3000"
    correcta: 3
    explicacion: "La ecuación del pago es p(m) = 800 + 200m. Sustituyendo m = 11: 800 + 200 × 11 = $3000."

  - id: E2-CASO2-q2
    tipo: directo
    area: E
    subarea: E2
    caso: "La empresa Telcel ofrece a sus clientes un plan que incluye celular nuevo en $800 y la tarifa fija mensual de $200, plan todo incluido."
    enunciado: "En un cuadro de costos de cajas de medicamentos, el usuario 1 compró 2x + 3y = 75 y el usuario 2 compró 4x + 8y = 115, donde x es el costo de una caja de aspirinas y y el de una caja de ibuprofeno. Elabora un sistema de ecuaciones 2×2 y resuelve las incógnitas."
    opciones:
      - "caja de aspirina $6.5 y caja de ibuprofeno $10"
      - "caja de aspirina $6.5 y caja de ibuprofeno $20"
      - "caja de aspirina $7.5 y caja de ibuprofeno $20"
      - "caja de aspirina $7.5 y caja de ibuprofeno $10"
    correcta: 2
    explicacion: "Resolviendo el sistema 2x + 3y = 75 y 4x + 8y = 115 por reducción: y = 20 e x = 7.5. La caja de aspirinas vale $7.5 y la de ibuprofeno $20."

  - id: E2-002
    tipo: directo
    area: E
    subarea: E2
    enunciado: "Resuelve la siguiente ecuación de primer grado: 15 − 9z = 13z − 7"
    opciones:
      - "z = 0"
      - "z = 1"
      - "z = 2"
      - "z = 3"
    correcta: 1
    explicacion: "Pasando términos: -9z - 13z = -7 - 15; -22z = -22; z = 1."

  - id: E2-003
    tipo: directo
    area: E
    subarea: E2
    enunciado: "De la siguiente ecuación de segundo grado, resuélvela: 2x² + 6x = 0"
    opciones:
      - "x1 = 1 y x2 = -3"
      - "x1 = 0 y x2 = 3"
      - "x1 = 0 y x2 = -3"
      - "x1 = 1 y x2 = 3"
    correcta: 2
    explicacion: "Con la fórmula general x = (-b ± √(b² − 4ac)) / 2a, sustituyendo a = 2, b = 6, c = 0: x1 = 0 y x2 = -3."

  - id: E2-CASO3-q1
    tipo: directo
    area: E
    subarea: E2
    caso: "En una empresa se compraron 5 copas de cristal y 4 de plástico por $85 para un evento. Además ya se tenían algunas copas del día anterior, pues se compraron 4 de cristal y 7 de plástico por $95."
    enunciado: "Determinar el precio de una copa de cristal y de una de plástico."
    opciones:
      - "cristal = $15 y plástico = $5"
      - "cristal = $10 y plástico = $10"
      - "cristal = $15 y plástico = $10"
      - "cristal = $5 y plástico = $15"
    correcta: 3
    explicacion: "Resolviendo el sistema 5c + 4p = 85 y 4c + 7p = 95 por reducción: p = $15 y c = $5. Una copa de cristal vale $5 y una de plástico $15."

  - id: E2-004
    tipo: directo
    area: E
    subarea: E2
    enunciado: "Es la representación del área bajo la curva de una función:"
    opciones:
      - "Integral indefinida"
      - "Integrales impropias"
      - "Integral definida"
      - "Integrales trigonométricas"
    correcta: 2
    explicacion: "La integral definida es el concepto utilizado para determinar la representación del área bajo la curva de una función."

  - id: E2-005
    tipo: directo
    area: E
    subarea: E2
    enunciado: "La definición de costo marginal de un productor es dm/dx = 0.7x + 5, y la producción actual es x = 96 unidades a la semana. ¿Cuánto más costará incrementar la producción a 230 unidades por semana?"
    opciones:
      - "$14,959.4"
      - "$15,959.4"
      - "$16,959.4"
      - "$17,959.4"
    correcta: 1
    explicacion: "M(230) − M(96) = ∫[96→230] (0.7x + 5) dx = [0.35x² + 5x] evaluada de 96 a 230 = (18515 + 1150) − (3225.6 + 480) = $15,959.4."

  - id: E2-006
    tipo: directo
    area: E
    subarea: E2
    enunciado: "El ingreso marginal de una empresa está determinado por C'(x) = 9.4 + 0.08x. Determinar el incremento del ingreso total cuando los niveles de ventas se amplían de 100 a 150 unidades."
    opciones:
      - "$950"
      - "$960"
      - "$970"
      - "$980"
    correcta: 2
    explicacion: "C(x) = ∫[100→150] (9.4 + 0.08x) dx = [9.4x + 0.04x²] de 100 a 150 = (1410 + 900) − (940 + 400) = $970."

  - id: E2-007
    tipo: directo
    area: E
    subarea: E2
    enunciado: "Se espera que una nueva máquina genere ahorro en costos de operación. Cuando la máquina tenga x años de uso, la razón de ahorro será de f(x) = 700 + 3500x pesos al año. ¿Cuánto se ahorra en costos de operación durante los primeros cuatro años?"
    opciones:
      - "$20800"
      - "$25800"
      - "$29800"
      - "$30800"
    correcta: 3
    explicacion: "∫[0→4] (700 + 3500x) dx = [700x + 1750x²] de 0 a 4 = 2800 + 28000 = $30800."

  - id: E2-008
    tipo: directo
    area: E
    subarea: E2
    enunciado: "La derivada de x⁶ es 6x⁵. ¿Cuál es la antiderivada de 6x⁵?"
    opciones:
      - "x⁶"
      - "x⁵"
      - "x³⁰"
      - "5x⁶"
    correcta: 0
    explicacion: "La antiderivada (primitiva o integral indefinida) de 6x⁵ es x⁶ + C, ya que su derivada es 6x⁵."

  - id: E2-009
    tipo: directo
    area: E
    subarea: E2
    enunciado: "Sea f una función real definida por f(x) = 5. ¿Cuál es su dominio?"
    opciones:
      - "A = Img(f)"
      - "A = R"
      - "A = Img"
      - "A = B"
    correcta: 1
    explicacion: "Al ser una función constante, cualquier número real evaluado en f da un número real (5); por lo tanto, el dominio son todos los números reales: A = R."

  - id: E2-010
    tipo: directo
    area: E
    subarea: E2
    enunciado: "¿Qué nombre reciben las funciones matemáticas que tienen la forma f(x) = k/x?"
    opciones:
      - "Funciones raíz"
      - "Funciones exponenciales"
      - "Funciones de proporcionalidad inversa"
      - "Funciones logarítmicas"
    correcta: 2
    explicacion: "Cuando la variable independiente y la dependiente son inversamente proporcionales (al aumentar una, la otra disminuye en la misma proporción), la función que las relaciona es de proporcionalidad inversa."

  - id: E2-CASO4-q1
    tipo: directo
    area: E
    subarea: E2
    caso: "La Cruz Roja realiza una encuesta a bailarinas de ballet y muestra que está aumentando el número de lesiones que ponen fin a su carrera. En 2017 el número de lesiones fue de 200 y en 2018 fue de 224. Las lesiones aumentan a una tasa lineal."
    enunciado: "¿Cuál sería la función n = f(t), donde n representa el número de lesiones y t el tiempo en años desde 2010, y cuándo se espera que el número de lesiones rebase las 300?"
    opciones:
      - "n = 24t + 32 y 11.16 años"
      - "n = 32t + 24 y 11.16 años"
      - "n = 24t + 32 y 12.16 años"
      - "n = 32t + 24 y 12.16 años"
    correcta: 0
    explicacion: "La pendiente m = (224 − 200) / (8 − 7) = 24. Con la ecuación de la recta se obtiene n = 24t + 32. Para n = 300: t = (300 − 32) / 24 = 11.16 años."

  - id: E2-011
    tipo: directo
    area: E
    subarea: E2
    enunciado: "La población proyectada de una ciudad está dada por p = 250,000(1.16)^(t/22), donde t es el número de años a partir de 2008. ¿Cuál es la población pronosticada para 2019?"
    opciones:
      - "259,258.24"
      - "249,258.24"
      - "239,258.24"
      - "269,258.24"
    correcta: 3
    explicacion: "Para t = 2019 − 2008 = 11 años: p = 250,000(1.16)^(11/22) = 250,000(1.16)^0.5 = 269,258.24."

  - id: E2-012
    tipo: directo
    area: E
    subarea: E2
    enunciado: "La ecuación de oferta de un fabricante es p = log(10 + q/4), donde q es el número de unidades al precio unitario p. ¿A qué precio el fabricante ofrecerá 11,980 unidades?"
    opciones:
      - "3.47"
      - "3.57"
      - "3.67"
      - "3.77"
    correcta: 0
    explicacion: "Sustituyendo q = 11,980: p = log(10 + 11980/4) = log(10 + 2995) = log(3005) = 3.47."

  # ==========================================================================
  # ÁREA 2 (PDF) — Economía y contabilidad empresarial → C / B
  # ==========================================================================

  - id: C3-CASO1-q1
    tipo: directo
    area: C
    subarea: C3
    caso: "Una empresa fabricante de loncheras plásticas ha tenido un importante crecimiento y cree que es momento de incursionar en los mercados internacionales. Dada la volatilidad del tipo de cambio y el riesgo país asociado a algunos estados, la decisión del país de destino no es fácil."
    enunciado: "Con base en un análisis macroeconómico externo, ¿qué factores son fundamentales revisar antes de empezar los procesos de exportación a un mercado de otro país?"
    opciones:
      - "Verificar la existencia de un gobierno amigo del régimen de nuestro país y que no haya competencia en ese mercado para nuestro producto."
      - "Analizar la tasa de ganancia del mercado del plástico doméstico y externo, las condiciones de intercambio comercial con el país destino y el riesgo económico."
      - "Verificar que el país destino no tenga barreras no arancelarias y que su industria no sea competitiva con nuestro producto ni el de otros países."
      - "Encontrar un mercado donde no haya restricciones importantes a la importación y carezca de controles de calidad de los plásticos."
    correcta: 1
    explicacion: "La tasa de ganancia por sector es fundamental dentro y fuera del país para determinar el atractivo del mercado y la viabilidad de la exportación. También es fundamental revisar las condiciones de intercambio y evaluar el riesgo."

  - id: C2-CASO2-q1
    tipo: directo
    area: C
    subarea: C2
    caso: "Un inversionista necesita redirigir parte de sus utilidades a una inversión de bajo riesgo dadas las condiciones de incertidumbre por la desaceleración económica global y la guerra comercial entre Estados Unidos y China."
    enunciado: "¿Qué elementos debe considerar para invertir estos activos y lograr una rentabilidad adecuada en el largo plazo?"
    opciones:
      - "La tasa de interés, la inflación, el riesgo tipo de cambio y el riesgo político de la economía."
      - "Las declaraciones de las autoridades sobre el crecimiento del PIB al final del periodo."
      - "Las condiciones de la balanza comercial del país y las inversiones del sector público."
      - "El crecimiento del PIB, la cartera vencida de las tiendas departamentales y la calificación internacional."
    correcta: 0
    explicacion: "La tasa de ganancia, el comportamiento de la inflación y el tipo de cambio son las variables críticas en una inversión de bajo riesgo, cuyo valor futuro depende de la inflación y del riesgo político a largo plazo."

  - id: C2-CASO3-q1
    tipo: directo
    area: C
    subarea: C2
    caso: "Una empresa fabricante de tabletas observa un crecimiento moderado pero constante y necesita proyectar sus ventas para 2021 con rigor matemático. Sus históricos son: 2018 $235,687; 2019 $369,825; 2020 $412,224."
    enunciado: "Aplicando el modelo de regresión lineal para el pronóstico de ventas, ¿cuál es el pronóstico para 2021?"
    opciones:
      - "$529,879.13"
      - "$489,996.50"
      - "$515,782.33"
      - "$520,782.00"
    correcta: 2
    explicacion: "Resolviendo la ecuación de la recta por el método de los mínimos cuadrados, el pronóstico para 2021 es $515,782.33."

  - id: C2-CASO4-q1
    tipo: directo
    area: C
    subarea: C2
    caso: "Una empresa de lácteos considera incursionar en suplementos para adultos mayores, pero las condiciones de mercado y el índice HH muestran una importante concentración de 2 de los 4 participantes más importantes. Índice HH: 52%; 4 participantes; regulaciones de Cofepris y sector salud; elasticidad de precios relativa."
    enunciado: "¿A qué situación de mercado se enfrenta la empresa de acuerdo con los datos del caso?"
    opciones:
      - "Duopolio puro por la concentración en dos empresas; no se recomienda invertir."
      - "Oligopolio; pese a dos participantes fuertes, resulta atractivo invertir por el tipo de mercado."
      - "Libre competencia, porque es un mercado poco explotado; la inversión es atractiva."
      - "Monopolio, porque una empresa es mayoritaria; no se permite invertir."
    correcta: 1
    explicacion: "El índice HH muestra la concentración de la participación, pero al existir más de dos participantes en número limitado, la condición es de oligopolio, en el que aún resulta interesante invertir."

  - id: C2-CASO5-q1
    tipo: directo
    area: C
    subarea: C2
    caso: "La embotelladora El Milenio trabaja al 92% de su capacidad instalada y el mercado se expande al 3% anual. Tiene competidores trabajando por debajo del 70% y la participación de mercado es medianamente equitativa. Si no realiza inversiones, el equipo empezará a perder por cada nueva unidad producida, aunque pueda venderla."
    enunciado: "¿Cuál es el principio económico que se está activando en la empresa estudiada?"
    opciones:
      - "Ciclo de vida de la empresa."
      - "Ley de Say."
      - "Aplicación del costo de oportunidad."
      - "Ley de rendimientos marginales decrecientes."
    correcta: 3
    explicacion: "La ley de los rendimientos marginales decrecientes establece que cuando el costo marginal crece por la fabricación de una unidad adicional, el producto marginal disminuye y se empieza a perder por cada unidad adicional."

  - id: C1-CASO6-q1
    tipo: directo
    area: C
    subarea: C1
    caso: "Carolina piensa comprar un vehículo con su reparto de utilidades. Con sus fondos puede dar un enganche de hasta el 20% de un auto compacto, pagará mensualidades promedio de $3,000 durante 50 meses y decidió aplazar sus vacaciones al extranjero al menos un año."
    enunciado: "Con base en lo anterior, ¿qué costo está asumiendo Carolina al decidirse por tener un auto nuevo?"
    opciones:
      - "Costo de adquisición."
      - "Costo marginal."
      - "Costo financiero."
      - "Costo de oportunidad."
    correcta: 3
    explicacion: "El costo de oportunidad es todo aquello a lo que renuncia Carolina (como su viaje al extranjero) a cambio de tener un auto nuevo que pagará a plazos."

  - id: B2-CASO7-q1
    tipo: directo
    area: B
    subarea: B2
    caso: "Un grupo de empresarios financieros tradicionalistas diversifica su oferta hacia el mercado del ahorro para el retiro, que está en crecimiento y con oferta competitiva, lo que permite generar fondos importantes para ahorradores y para el mercado bancario."
    enunciado: "¿Cuál es la instancia que emite la normativa financiera para poder participar en el mercado de las AFORES?"
    opciones:
      - "CONSAR"
      - "CNBV"
      - "BANXICO"
      - "CONAC"
    correcta: 0
    explicacion: "La Comisión Nacional del Sistema de Ahorro para el Retiro (CONSAR) emite la normativa para todo el sistema de ahorro para el retiro, por lo que es la regulación que debe atenderse."

  - id: B2-CASO8-q1
    tipo: directo
    area: B
    subarea: B2
    caso: "Un emprendedor arrancará un negocio de venta de accesorios para celulares. La venta al detalle crece al 3% anual en Ayala, Morelos; cuenta con un local de baja renta en una plaza de nueva creación; y una investigación de mercado revela que la facturación electrónica es un factor importante en la decisión de compra."
    enunciado: "¿Qué esquema normativo es fundamental para atender la demanda de su mercado y trabajar conforme a la norma contable vigente?"
    opciones:
      - "Alta ante la SHCP como contribuyente (persona física o moral), según el régimen comercial vigente."
      - "Contratar un servicio de facturación que emita comprobantes fiscales 3.3 para emitir facturas."
      - "Buscar gestoría ante la SHCP para facturar por medio de un tercero y trabajar sin emisión de comprobantes."
      - "Generar permisos ante la autoridad municipal en la ventanilla única para funcionamiento y emisión de facturas."
    correcta: 0
    explicacion: "El trámite correcto es el alta ante la SHCP (concretamente el SAT) para poder emitir comprobantes 3.3, funcionar conforme a la ley y atender la emisión de comprobantes a los compradores."

  - id: B2-CASO9-q1
    tipo: directo
    area: B
    subarea: B2
    caso: "La empresa Los limones franceses fabrica Pay de Limón en Monterrey y, en su aniversario, realizó una carrera atlética costeando todo lo necesario e hizo donaciones económicas a varias casas hogar. El contador indica que las donaciones deben quedar registradas y deducidas conforme a la ley."
    enunciado: "De acuerdo con la normatividad contable vigente en la Ley del ISR, ¿qué porcentaje de estas donaciones directas es deducible contablemente?"
    opciones:
      - "100% a casa hogar y las indirectas no son deducibles."
      - "50% de las donaciones directas y 10% las indirectas."
      - "7% sobre los ingresos acumulables."
      - "100% sobre los ingresos acumulables."
    correcta: 2
    explicacion: "Conforme al artículo 27 (fracción I) de la Ley del ISR, el monto total de donativos es deducible hasta por una cantidad que no exceda el 7% de los ingresos acumulables del ejercicio inmediato anterior."

  - id: B1-CASO10-q1
    tipo: directo
    area: B
    subarea: B1
    caso: "Juan Carlos es emprendedor y se encarga de la contabilidad de su negocio, ya en fase operativa. Las ventas han logrado flujos de efectivo aceptables, pero esto debe demostrarse a los socios capitalistas que pusieron su confianza y su dinero en el emprendimiento."
    enunciado: "¿Qué informe económico especializado usará Juan Carlos para dar a conocer la situación del negocio cada trimestre y de manera anual?"
    opciones:
      - "Estados financieros"
      - "Reporte de ventas"
      - "Reporte de utilidad bruta por trimestre y consolidada por año."
      - "Flujo de caja y estado general de las finanzas."
    correcta: 0
    explicacion: "Los estados financieros, de acuerdo con la normatividad del IMCP y la SHCP, son el documento que por excelencia expresa la situación financiera de la empresa."

  - id: B1-CASO11-q1
    tipo: directo
    area: B
    subarea: B1
    caso: "La empresa Cubos plásticos del norte, donde Yesenia es contadora, inicia inversiones de expansión fabricando cubetas para exportar. Las reservas de capital fueron insuficientes para financiar la nueva maquinaria, por lo que se recurrió a un crédito bancario."
    enunciado: "¿En qué cuenta debe registrar Yesenia los $569,857 de préstamos que se usaron para la compra de los bienes de capital?"
    opciones:
      - "Activos de capital"
      - "Cuenta corriente de bancos."
      - "Pasivo no corriente."
      - "Pasivo circulante."
    correcta: 0
    explicacion: "Si se adquiere maquinaria, debe considerarse como un activo fijo (de capital), pues el tiempo que tarda en amortizarse es mayor a un año."

  - id: B1-CASO12-q1
    tipo: directo
    area: B
    subarea: B1
    caso: "Una empresa vidriera del Golfo de México genera ventas a desarrollos residenciales de interés social, con una facturación anual por este concepto de $2,786,523.52. Las facturas que emite generan IVA, lo que aumenta el monto susceptible de transferencia."
    enunciado: "De acuerdo con la tasa vigente de IVA en México en 2019, ¿cuál es el monto a transferir por este concepto al SAT antes de compensaciones o acreditaciones?"
    opciones:
      - "$442,483.26"
      - "$445,843.76"
      - "$417,978.53"
      - "$465,349.43"
    correcta: 1
    explicacion: "El IVA en la región del Golfo de México es del 16% conforme a las regulaciones del SAT; es un impuesto que se transfiere. Sobre $2,786,523.52 corresponde $445,843.76."

  - id: B4-CASO13-q1
    tipo: directo
    area: B
    subarea: B4
    caso: "Un restaurante yucateco quiere conocer el costo unitario de la orden individual de sopa de lima. Datos: costos variables por orden $30; costos fijos mensuales $19,000; unidades que se esperan vender por mes 1,000."
    enunciado: "Con base en estos datos y calculándolo por fórmula, ¿cuál es el costo unitario de cada orden de sopa de lima?"
    opciones:
      - "$49.00"
      - "$76.00"
      - "$39.00"
      - "$79.00"
    correcta: 0
    explicacion: "CU = costo variable + (costos fijos / unidades esperadas) = 30 + (19,000 / 1,000) = 30 + 19 = $49."

  - id: B4-CASO13-q2
    tipo: directo
    area: B
    subarea: B4
    caso: "Un restaurante yucateco quiere conocer el costo unitario de la orden individual de sopa de lima. Datos: costos variables por orden $30; costos fijos mensuales $19,000; unidades que se esperan vender por mes 1,000."
    enunciado: "Determina mediante fórmula el precio de venta y el volumen de equilibrio de venta de sopas de lima si se espera un rendimiento sobre ventas del 18%."
    opciones:
      - "Precio de venta: $60.10 y volumen de equilibrio: 640.69 unidades."
      - "Precio de venta: $60.76 y volumen de equilibrio: 1000.00 unidades."
      - "Precio de venta: $35.40 y volumen de equilibrio: 640.50 unidades."
      - "Precio de venta: $59.76 y volumen de equilibrio: 638.44 unidades."
    correcta: 3
    explicacion: "Precio = costo unitario / (1 − rendimiento) = 49 / (1 − 0.18) = $59.76. Volumen de equilibrio = costos fijos / (precio − costo variable) = 19,000 / (59.76 − 30) = 638.44 unidades."

  - id: B3-CASO15-q1
    tipo: directo
    area: B
    subarea: B3
    caso: "Una pequeña empresa inicia actividades en Querétaro con capital semilla de una incubadora de fondos mixtos. Para seguir accediendo a recursos, la incubadora le pide registros de las ventas al detalle."
    enunciado: "Para atender esta obligación contable, ¿qué documento debe generarse para el registro cronológico y diario de las operaciones?"
    opciones:
      - "Libro diario."
      - "Libro de caja."
      - "Cuentas T."
      - "Balance general."
    correcta: 0
    explicacion: "El libro diario es el documento dentro de los libros de contabilidad que asienta todas las operaciones que se realizan día a día en el negocio."

  - id: B3-CASO16-q1
    tipo: directo
    area: B
    subarea: B3
    caso: "Toda empresa debe acatar normatividad contable que le permita atender las obligaciones fiscales y generar una relación detallada de las mercancías en existencia susceptibles de vender o usar como materias primas."
    enunciado: "Dentro de los libros de contabilidad, ¿qué libro registra las entradas, salidas y estancia en bodega de las mercancías, insumos y materias primas?"
    opciones:
      - "Libro de inventario."
      - "Libro de caja."
      - "Libro de primeras entradas y salidas."
      - "Libro diario."
    correcta: 0
    explicacion: "El libro de inventarios contiene una relación detallada de las existencias finales listas para la venta, valoradas al costo."

  - id: B3-CASO17-q1
    tipo: directo
    area: B
    subarea: B3
    caso: "Daniel es el pagador de una empresa. Pese a los avances en pagos electrónicos, aún hace algunos pagos por cheque y operaciones en hojas sueltas con diversas entidades. Al final del día, estas operaciones se asientan en el libro diario."
    enunciado: "Estas hojas sueltas que sirven de apoyo para las operaciones individuales pertenecen a un método conocido como:"
    opciones:
      - "Método centralizador."
      - "Método de pólizas."
      - "Método de partida doble."
      - "Método de diario continental."
    correcta: 1
    explicacion: "El método de pólizas se basa en el uso de hojas sueltas (pólizas), documento en que se consignan de manera individual las operaciones realizadas por una entidad económica."

  - id: B4-CASO18-q1
    tipo: directo
    area: B
    subarea: B4
    caso: "Un restaurante de Cuernavaca tiene en su menú una cava de vinos californianos de importación directa. Por la incertidumbre del T-MEC y la amenaza de nuevos aranceles, sus precios pueden aumentar entre 5 y 8%."
    enunciado: "¿En qué parámetro de costos puede afectar a la empresa este aumento del costo de sus vinos?"
    opciones:
      - "Costos fijos."
      - "Costos variables."
      - "Costos operativos."
      - "Costos de venta."
    correcta: 1
    explicacion: "El impacto es sobre los costos variables, ya que es un producto de venta al público cuyo ingreso a almacén depende de la demanda; si incrementa el precio por el tipo de cambio, se incrementa el costo variable."

  - id: B4-CASO19-q1
    tipo: directo
    area: B
    subarea: B4
    caso: "Ismael y Gerardo emprenderán la exportación al mercado europeo de libros gráficos de marquetería. Antes de exportar necesitan calcular el precio por utilidad meta. Datos: costo unitario $3,200; rendimiento esperado de la inversión 21%; unidades a exportar 12,000; inversión inicial $798,000."
    enunciado: "Calcula el precio por utilidad meta (no el precio de venta final) de los libros mencionados."
    opciones:
      - "$3,213.97"
      - "$3,872.12"
      - "$4,258.89"
      - "$3,258.23"
    correcta: 0
    explicacion: "Precio por utilidad meta = costo unitario + (retorno deseado × inversión / unidades) = 3,200 + (0.21 × 798,000 / 12,000) = $3,213.97."

  - id: B1-CASO20-q1
    tipo: directo
    area: B
    subarea: B1
    caso: "Una empresa de banquetes para eventos sociales ha crecido y está obligada a emitir comprobantes fiscales digitales y presentar declaraciones por el portal del SAT. Por ello renovó su equipo de cómputo de oficinas e incorporó dispositivos móviles."
    enunciado: "¿En qué clasificación de activos se clasifica la adquisición de estos equipos?"
    opciones:
      - "Activo fijo"
      - "Activo diferido"
      - "Activo circulante"
      - "Activos e insumos"
    correcta: 0
    explicacion: "Dentro del activo fijo se encuentran las cuentas de mobiliario y equipo de oficina y de equipo de cómputo, que agrupan la adquisición de nuevos equipos como los descritos."

  - id: C1-CASO21-q1
    tipo: directo
    area: C
    subarea: C1
    caso: "Importadora de plásticos industriales exporta embudos automotrices a Chile, posicionándose con éxito. Sin embargo, autoridades chilenas le colocaron cuotas restrictivas de importación para favorecer a una empresa venezolana. Ambas naciones pertenecen a la OMC."
    enunciado: "¿Qué principio de la OMC puede invocar México para evitar este trato discriminatorio?"
    opciones:
      - "Cláusula de la nación más favorecida."
      - "Trato equitativo y uniforme."
      - "Fase de solución de mutuo acuerdo de diferencias."
      - "Acuerdo de la ronda de Uruguay."
    correcta: 0
    explicacion: "La cláusula de nación más favorecida establece que el trato preferente que un país concede a otro debe extenderse a todos los países del tratado."

  - id: C1-CASO22-q1
    tipo: directo
    area: C
    subarea: C1
    caso: "Una importadora de juguetes trae pistolas de pintura desde Estados Unidos. La demanda es tal que tiene pedidos para seis meses, y los clientes pagan por adelantado por la incertidumbre. Sin embargo, su proveedor solo factura los pedidos a la cotización del dólar al día de embarque."
    enunciado: "Se corre un riesgo de comercio internacional en esta transacción. ¿A qué tipo de riesgo se hace referencia?"
    opciones:
      - "Riesgo económico"
      - "Riesgo país"
      - "Riesgo tipo de cambio"
      - "Riesgo político"
    correcta: 2
    explicacion: "Si los compromisos financieros están en otra moneda, la empresa queda expuesta a pérdidas por la variación en el tipo de cambio, lo que implica un riesgo tipo de cambio."

  - id: B5-CASO23-q1
    tipo: directo
    area: B
    subarea: B5
    caso: "Un asesor de un miembro del Congreso analiza un aumento en el impuesto de mayor facilidad relativa de recaudación y mayor monto. En esta etapa no analiza impactos sociales, solo busca, dentro de la normatividad financiera, cómo lograr más fondos para el gobierno."
    enunciado: "Al buscar incrementos en un impuesto de fácil recaudación y de amplia aplicación, ¿qué impuesto se debería aumentar bajo estos criterios?"
    opciones:
      - "IVA (Impuesto al valor agregado)"
      - "ISR (Impuesto sobre la renta)"
      - "ISPT (Impuesto sobre el producto del trabajo)"
      - "Impuestos a alimentos preparados"
    correcta: 0
    explicacion: "El IVA es un impuesto que pagan todos los consumidores y es fácil de recaudar porque se transfiere, aunque es sumamente impopular."

  - id: B5-CASO24-q1
    tipo: directo
    area: B
    subarea: B5
    caso: "En un despacho se pondera el valor presente neto (VPN) de un proyecto de inversión de una panadería tradicional. Los flujos son atractivos, pero los asesores deben tomar una decisión basada en toda la información financiera."
    enunciado: "Si después de los cálculos obtienen un VPN de 0.5, ¿qué se debe hacer con el proyecto?"
    opciones:
      - "Rechazarlo porque es un VPN muy bajo."
      - "Aceptarlo y revisar en paralelo otros indicadores."
      - "Recomendar incrementar los flujos o la tasa esperada."
      - "Recomendar otra rama productiva con mayor rendimiento."
    correcta: 1
    explicacion: "Todos los proyectos de inversión cuyo VPN sea mayor que cero se aceptan, independientemente de la revisión posterior de otras variables."

  - id: B5-CASO25-q1
    tipo: directo
    area: B
    subarea: B5
    caso: "El contralor general de Carnicerías de Occidente analiza la información financiera y observa un gran número de pasivos con proveedores a largo plazo bien financiados, pero una falta de liquidez; su capitalización es muy buena."
    enunciado: "Considerando estos indicadores, ¿cómo se considera la sobrevivencia y situación de la empresa?"
    opciones:
      - "Iliquidez sin problemas de sobrevivencia en el largo plazo."
      - "La iliquidez detonará incumplimientos que ponen en juego a la empresa."
      - "Mientras la empresa esté capitalizada, la iliquidez es irrelevante."
      - "Lo importante es mantener pasivos cubiertos, aunque no haya liquidez."
    correcta: 1
    explicacion: "Una empresa correctamente capitalizada y financiada, pero con iliquidez, no sobrevivirá. La disposición de fondos líquidos es fundamental."

